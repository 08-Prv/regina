<head>

    <style>
        :root {
            --primary: #0f172a;
            --secondary: #334155;
            --accent: #3b82f6;
            --success: #10b981;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Creative Header */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #1e293b 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }

        header h1 { margin: 0; font-size: 3.2rem; font-weight: 800; letter-spacing: -1px; }
        header .designation { font-size: 1.25rem; color: var(--accent); font-weight: 600; margin-top: 10px; }
        header .contacts { margin-top: 20px; font-size: 0.9rem; color: #cbd5e1; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

        /* Creative Dashboard Grid */
        .dashboard {
            max-width: 1200px;
            margin: -40px auto 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 20px;
        }

        .tag-card {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .tag-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        .tag-card .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .tag-card h3 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary); }

        /* Modal / Content Overlay */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            overflow-y: auto;
        }

        .modal-content {
            background: var(--white);
            margin: 40px auto;
            padding: 50px;
            width: 90%;
            max-width: 1000px;
            border-radius: 24px;
            position: relative;
            text-align: left;
            animation: modalIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .close-btn {
            position: absolute;
            top: 25px; right: 30px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        /* Detail Styling */
        .section-header { border-left: 6px solid var(--accent); padding-left: 20px; margin-bottom: 30px; }
        .section-header h2 { margin: 0; color: var(--primary); font-size: 2rem; }
        
        .data-block { background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .data-block h4 { margin-top: 0; color: var(--accent); font-size: 1.1rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }

        footer { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem; }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .modal-content { padding: 25px; margin: 20px auto; }
        }
    </style>
</head>
